name: Deploy to GitHub Pages (Custom Domain + Debug)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo state (debug)
        run: |
          ls -la
          echo "---- package.json ----"
          cat package.json || true
          echo "---- next.config.mjs ----"
          cat next.config.mjs || true
          echo "---- app ----"
          ls -la app || true
          echo "---- styles ----"
          ls -la styles || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (no lockfile required)
        run: npm install

      - name: Ensure next is available
        run: npx --yes next@14.2.5 --version

      - name: Build (Next.js → static)
        run: npm run build

      - name: Add CNAME (if CUSTOM_DOMAIN is set)
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > out/CNAME

      - name: Verify export (debug)
        run: |
          test -d out || (echo "ERROR: ./out not found" && exit 2)
          ls -la out | head -50

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

